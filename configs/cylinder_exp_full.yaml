data:
  nc_path: data/cylinder2d.nc
  var_keys: ["u", "v"]
  cache_dir: null
  model_dataset_specs:
    linear:
      task_type: pod_coeff_regression
      input_space: vector
      input_representation: masked_sparse_observation_vector
      output_representation: pod_coefficients
      field_channels: 2
    mlp:
      task_type: pod_coeff_regression
      input_space: vector
      input_representation: masked_sparse_observation_vector
      output_representation: pod_coefficients
      field_channels: 2
    vcnn:
      task_type: spatial_field_reconstruction
      input_space: image
      feature_builder: per_channel_voronoi_plus_mask
      input_representation: voronoi_per_channel_plus_mask
      output_representation: full_field
      field_channels: 2
      feature_channels: 3
      include_mask_channel: true
    vitae:
      task_type: spatial_field_reconstruction
      input_space: image
      feature_builder: per_channel_voronoi_plus_mask
      input_representation: voronoi_per_channel_plus_mask
      output_representation: full_field
      field_channels: 2
      feature_channels: 3
      include_mask_channel: true
  observation_mask_strategy: cylinder_structure_aware
  observation_mask_seed: 0
  observation_mask_kwargs:
    # Width partition in pure index space: [0, 0.15W], [0.15W, 0.5W], [0.5W, W]
    region_bounds_frac: [0.15, 0.5]
    region_ratios:
      left: 0.35
      middle: 0.35
      right: 0.20
      global_random: 0.10

    # Keep a center preference, but explicitly push part of the mass to the two flanks
    # of the vortex street instead of collapsing onto the center trajectory.
    center_bias_strength: 1.2
    center_bias_sigma_frac: 0.16
    flank_weight: 0.42
    flank_offset_frac: 0.11
    flank_sigma_frac: 0.07

    # Use temporal variance, but mix in spatial gradients and flatten sharp peaks so the
    # sampler also covers energetic edges instead of only the ridge centerline.
    importance_source: temporal_variance
    importance_channel_reduce: l2
    importance_mix: 0.5
    importance_gradient_mix: 0.38
    importance_power: 0.72

    # Keep some emphasis near the onset region, but make it wider and weaker.
    hotspot:
      center: [40, 40]
      sigma: [9, 30]
      weight: 0.18

    # Deterministic skeleton points distributed on 3 horizontal lines.
    skeleton_points: 12
    skeleton_line_offsets_frac: [0.0, -0.1, 0.1]

    # Pre-generate several templates; L2 deterministically selects one per mask_rate and reuses it across time.
    num_templates: 4
    min_distance: 3

pod:
  r: 128
  center: true
  save_dir: artifacts/pod/cylinder2d

  # 和 eval.fourier.grid_meta.dx/dy 对齐
  dx: 0.0125
  dy: 0.0125

  # ===== Level-1: ScaleTable =====
  scale_channel_reduce: l2
  enable_scale_analysis: true
  scale_analysis:
    method: B_robust_energy_centroid
    # 角波数(rad/len)，None 表示不截断；建议先不截断，等你看 preview 再收紧
    k_min: null
    k_max: null
    demean_line: true

  # ===== Level-1: Basis spectrum dict (Q_i) =====
  enable_basis_spectrum: true
  fft_basis:
    demean: true
    window: null
    norm: null

eval:
  mask_rates: [0.0001, 0.0005, 0.001, 0.002, 0.005]
  noise_sigmas: [0, 0.001, 0.01, 0.1]

  pod_bands:
    L1: [0, 16]
    L2: [16, 32]
    M1: [32, 48]
    M2: [48, 64]
    M3: [64, 80]
    H1: [80, 96]
    H2: [96, 112]
    H3: [112, 128]

  centered_pod: true
  save_dir: artifacts/eval

  fourier:
    enabled: true
    band_scheme: physical

    grid_meta:
      Lx: 8.0
      Ly: 1.0
      obstacle_diameter: 0.125
      dx: 0.0125
      dy: 0.0125
      angular: false   # false: cycles/length; true: rad/length (pi/dx Nyquist)

    binning: log
    num_bins: 64
    k_min_eval: 0.7
    sample_frames: 128          # -1 表示全帧（如果你的实现支持；否则改成 1501 或其它整数）
    kstar_threshold: 1.0
    mean_mode_true: global
    save_curve: true

    band_names: [Background, Big, Medium, Small, Tiny]
    lambda_edges: [1.0, 0.5, 0.25, 0.125]

    # ===== v2.1: 2D FFT stats saving options =====
    save_fft2_2d_stats: true

    # what 支持的 token 以代码实现为准；loader 默认就是这 6 个
    # - P_true: |F_true|^2 (2D power)
    # - P_pred: |F_pred|^2
    # - P_err : |F_pred - F_true|^2
    # - C_tp  : F_true * conj(F_pred) (cross spectrum)
    # - coh   : |C_tp|^2 / (P_true * P_pred + eps) (magnitude-squared coherence)
    # - H     : (若你实现了 transfer / gain 之类的额外量；否则可以先删掉)
    fft2_2d_stats_what: ["P_true", "P_pred", "P_err", "C_tp", "coh", "H"]

    # True: across frames accumulate then average (推荐：得到稳定的统计量)
    # False: 可能会存每帧（体积会膨胀，不建议）
    fft2_2d_stats_avg_over_frames: true

    # complex64 够用且省空间；如果你实现里 P_* 最终是 float32，也可以用 float32
    fft2_2d_stats_dtype: complex64

    # shifted 更适合做 2D 谱图可视化；统计径向 bin 两者都行，但要全链路统一
    fft2_2d_stats_store_shifted: true

    # None 表示继承 sample_frames；-1 表示全帧；整数表示抽样数量
    fft2_2d_stats_sample_frames: null

train:
  model_types: [linear, mlp, vcnn, vitae]
  model_configs:
    linear:
      task_type: pod_coeff_regression
    mlp:
      task_type: pod_coeff_regression
      hidden_dims: [128, 128]
      max_epochs: 400
    vcnn:
      task_type: spatial_field_reconstruction
      input_representation: voronoi_per_channel_plus_mask
      normalize_mean_std: true
      optimizer: adamw
      hidden_channels: 32
      num_layers: 6
      kernel_size: 7
      loss_type: mae
      obs_weight: 1.0
      weight_decay: 0.05
      warmup_epochs: 10
      min_lr: 0.0
      use_cosine_schedule: true
      batch_size: 12
      eval_batch_size: 12
      max_epochs: 25
      val_ratio: 0.1
    vitae:
      task_type: spatial_field_reconstruction
      input_representation: voronoi_per_channel_plus_mask
      normalize_mean_std: true
      optimizer: adamw
      variant: lite
      patch_size: 8
      loss_type: mae
      obs_weight: 1.0
      aux_loss_weight: 0.2
      weight_decay: 0.05
      warmup_epochs: 10
      min_lr: 0.0
      use_cosine_schedule: true
      batch_size: 8
      eval_batch_size: 8
      max_epochs: 25
      val_ratio: 0.1
  # 对照基线，不设置任何噪声，确认所有流程正确
  noise_sigma: 0.0
  hidden_dims: [64, 64]
  lr: 0.001
  seed: 0
  use_weighted_loss: false
  loss_weighting: pod_energy
  loss_weight_power: 1.0
  batch_size: 64
  max_epochs: 500
  device: cuda
  save_dir: artifacts/nn
