data:
  source: mat_sst
  path: data/sst_weekly.mat
  cache_dir: artifacts/preanalysis_cache

  mat_key: sst
  sst_fill_nan: per_frame_mean
  sst_reshape: 360x180_rot90
  # IMPORTANT: full dataset has T=1914 and is expensive for full SVD.
  # Keep this small for smoke tests; increase if you switch to truncated/randomized SVD.
  sst_max_frames: 64

pod:
  r: 64
  center: true
  save_dir: artifacts/pod/sst_weekly

  dx: 1.0
  dy: 1.0

  scale_channel_reduce: l2
  enable_scale_analysis: false
  scale_analysis:
    method: B_robust_energy_centroid
    k_min: null
    k_max: null
    demean_line: true

  enable_basis_spectrum: false
  fft_basis:
    demean: true
    window: null
    norm: null

eval:
  mask_rates: [0.0004]
  noise_sigmas: [0.0]

  pod_bands:
    L1: [0, 16]
    L2: [16, 32]
    M1: [32, 48]
    M2: [48, 64]

  centered_pod: true
  save_dir: artifacts/eval

  fourier:
    enabled: true
    band_scheme: physical
    grid_meta:
      dx: 1.0
      dy: 1.0
      angular: false
    binning: log
    num_bins: 64
    k_min_eval: 0.25
    sample_frames: 8
    kstar_threshold: 1.0
    mean_mode_true: global
    save_curve: false
    band_names: [L, M, H]
    lambda_edges: [1.0, 0.25]
