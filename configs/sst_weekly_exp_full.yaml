data:
  source: mat_sst
  path: data/sst_weekly.mat
  cache_dir: artifacts/preanalysis_cache
  model_dataset_specs:
    linear:
      task_type: pod_coeff_regression
      input_space: vector
      input_representation: masked_sparse_observation_vector
      output_representation: pod_coefficients
      field_channels: 1
    mlp:
      task_type: pod_coeff_regression
      input_space: vector
      input_representation: masked_sparse_observation_vector
      output_representation: pod_coefficients
      field_channels: 1
    vcnn:
      task_type: spatial_field_reconstruction
      input_space: image
      feature_builder: per_channel_voronoi_plus_mask
      input_representation: voronoi_per_channel_plus_mask
      output_representation: full_field
      field_channels: 1
      feature_channels: 2
      include_mask_channel: true
    vitae:
      task_type: spatial_field_reconstruction
      input_space: image
      feature_builder: per_channel_voronoi_plus_mask
      input_representation: voronoi_per_channel_plus_mask
      output_representation: full_field
      field_channels: 1
      feature_channels: 2
      include_mask_channel: true
  observation_mask_strategy: random
  observation_mask_seed: 0

  mat_key: sst
  sst_fill_nan: per_frame_mean
  sst_reshape: 360x180_rot90

  # 注意：该值需和现有 L1(pod_meta.T)一致，否则 L2 会因 T 不匹配失败
  sst_max_frames: 64

pod:
  r: 64
  center: true
  save_dir: artifacts/pod/sst_weekly

  dx: 1.0
  dy: 1.0

  # cumulate 三个 L4 模组依赖 L1 的 scale_table.csv
  scale_channel_reduce: l2
  enable_scale_analysis: true
  scale_analysis:
    method: B_robust_energy_centroid
    k_min: null
    k_max: null
    demean_line: true

  # L2/L4(cumulate) 不依赖 basis_spectrum，保持关闭
  enable_basis_spectrum: false
  fft_basis:
    demean: true
    window: null
    norm: null

eval:
  # 必须保持与 cylinder_exp_full 一致
  mask_rates: [0.0001, 0.0005, 0.001, 0.002, 0.005]
  noise_sigmas: [0, 0.001, 0.01, 0.1]

  centered_pod: true
  fourier:
    enabled: true
    band_scheme: physical

    grid_meta:
      Lx: 360.0
      Ly: 180.0
      dx: 1.0
      dy: 1.0
      angular: false

    binning: log
    num_bins: 64
    k_min_eval: 0.02
    sample_frames: 32
    kstar_threshold: 1.0
    mean_mode_true: global
    save_curve: true

    band_names: [Background, Basin, Regional, Mesoscale, Small]
    lambda_edges: [120.0, 48.0, 16.0, 6.0]

    save_fft2_2d_stats: true
    fft2_2d_stats_what: ["P_true", "P_pred", "P_err", "C_tp", "coh", "H"]
    fft2_2d_stats_avg_over_frames: true
    fft2_2d_stats_dtype: complex64
    fft2_2d_stats_store_shifted: true
    fft2_2d_stats_sample_frames: null

train:
  model_types: [linear, mlp, vcnn, vitae]
  model_configs:
    linear:
      task_type: pod_coeff_regression
    mlp:
      task_type: pod_coeff_regression
      hidden_dims: [128, 128]
      max_epochs: 320
    vcnn:
      task_type: spatial_field_reconstruction
      input_representation: voronoi_per_channel_plus_mask
      hidden_channels: 24
      num_layers: 5
      kernel_size: 7
      loss_type: mae
      obs_weight: 1.0
      batch_size: 8
      eval_batch_size: 8
      max_epochs: 140
      val_ratio: 0.1
    vitae:
      task_type: spatial_field_reconstruction
      input_representation: voronoi_per_channel_plus_mask
      variant: lite
      patch_size: 12
      loss_type: mae
      obs_weight: 1.0
      aux_loss_weight: 0.2
      batch_size: 6
      eval_batch_size: 6
      max_epochs: 120
      val_ratio: 0.1
  # 保持与 cylinder_exp_full 一致
  noise_sigma: 0.0
  hidden_dims: [64, 64]
  lr: 0.001
  use_weighted_loss: false
  loss_weighting: pod_energy
  loss_weight_power: 1.0
  batch_size: 64
  max_epochs: 500
  device: cuda
  save_dir: artifacts/nn
