data:
  source: mat_sst
  path: data/sst_weekly.mat
  cache_dir: artifacts/preanalysis_cache

  mat_key: sst
  sst_fill_nan: per_frame_mean
  sst_reshape: 360x180_rot90

  # mini 子采样：约 19/1914 ~= 0.99%，单数据体量约 4.69MB
  sst_max_frames: 19

pod:
  r: 32
  center: true
  # mini 需单独 POD 目录，避免和 full L1(T=64)冲突
  save_dir: artifacts/pod/sst_weekly_mini

  dx: 1.0
  dy: 1.0

  scale_channel_reduce: l2
  enable_scale_analysis: true
  scale_analysis:
    method: B_robust_energy_centroid
    k_min: null
    k_max: null
    demean_line: true

  enable_basis_spectrum: false
  fft_basis:
    demean: true
    window: null
    norm: null

eval:
  # 必须保持与 cylinder_exp_full 一致
  mask_rates: [0.0001, 0.0005, 0.001, 0.002, 0.005]
  noise_sigmas: [0, 0.001, 0.01, 0.1]

  centered_pod: true

train:
  # 保持与 cylinder_exp_full 一致
  noise_sigma: 0.0
  hidden_dims: [64, 64]
  lr: 0.001
  batch_size: 64
  max_epochs: 500
  device: cuda
  save_dir: artifacts/nn
