data:
  source: h5_rdb
  path: data/2D_rdb_NA_NA.h5
  cache_dir: artifacts/preanalysis_cache
  model_dataset_specs:
    linear:
      task_type: pod_coeff_regression
      input_space: vector
      input_representation: masked_sparse_observation_vector
      output_representation: pod_coefficients
      field_channels: 2
    mlp:
      task_type: pod_coeff_regression
      input_space: vector
      input_representation: masked_sparse_observation_vector
      output_representation: pod_coefficients
      field_channels: 2
    vcnn:
      task_type: spatial_field_reconstruction
      input_space: image
      feature_builder: per_channel_voronoi_plus_mask
      input_representation: voronoi_per_channel_plus_mask
      output_representation: full_field
      field_channels: 2
      feature_channels: 3
      include_mask_channel: true
    vitae:
      task_type: spatial_field_reconstruction
      input_space: image
      feature_builder: per_channel_voronoi_plus_mask
      input_representation: voronoi_per_channel_plus_mask
      output_representation: full_field
      field_channels: 2
      feature_channels: 3
      include_mask_channel: true
  observation_mask_strategy: radial_spiral
  observation_mask_seed: 0
  observation_spiral_max_radius_frac: 0.875

  h5_rdb_dataset_key: data
  h5_rdb_group_count: 50
  h5_rdb_group_start: 0
  h5_rdb_group_step: 1
  h5_rdb_frames_per_group: 50
  h5_rdb_frame_sampling: linspace

pod:
  r: 512
  center: true
  save_dir: artifacts/pod/rdb_h5

  dx: 1.0
  dy: 1.0

  # cumulate 三个 L4 模组依赖 L1 的 scale_table.csv
  scale_channel_reduce: l2
  enable_scale_analysis: true
  scale_analysis:
    method: B_robust_energy_centroid
    k_min: null
    k_max: null
    demean_line: true

  # L2/L4(cumulate) 不依赖 basis_spectrum，保持关闭
  enable_basis_spectrum: false
  fft_basis:
    demean: true
    window: null
    norm: null

eval:
  # 必须保持与 cylinder_exp_full 一致
  mask_rates: [0.0002, 0.0005, 0.001, 0.002, 0.005]
  noise_sigmas: [0, 0.001, 0.01, 0.1]

  centered_pod: true

  # 以下大多用于其它 L4 模组，当前仅保留注释模板，不参与解析
  # save_dir: artifacts/eval
  # pod_bands:
  #   L1: [0, 16]
  #   L2: [16, 32]
  # fourier:
  #   enabled: true
  #   band_scheme: physical

train:
  model_types: [linear, mlp]
  model_configs:
    linear:
      task_type: pod_coeff_regression
    mlp:
      task_type: pod_coeff_regression
      hidden_dims: [64, 64]
    vcnn:
      task_type: spatial_field_reconstruction
      input_representation: voronoi_per_channel_plus_mask
    vitae:
      task_type: spatial_field_reconstruction
      input_representation: voronoi_per_channel_plus_mask
  # 保持与 cylinder_exp_full 一致
  noise_sigma: 0.0
  hidden_dims: [64, 64]
  lr: 0.001
  use_weighted_loss: false
  loss_weighting: pod_energy
  loss_weight_power: 1.0
  batch_size: 64
  max_epochs: 500
  device: cuda
  save_dir: artifacts/nn
